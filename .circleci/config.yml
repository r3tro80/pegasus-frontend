version: 2
jobs:
  mingw:
    docker:
      - image: mmatyas/pegasus-qt-mingw
    environment:
      QT_VERSION: qt51510
      QT_TARGET: win32-mingw-static
      BUILDOPTS:
        USE_SDL_GAMEPAD=1
        USE_SDL_POWER=1
        SDL_LIBS='-L/opt/SDL2-2.32.10/lib/ -lSDL2 -Wl,--no-undefined -lm -ldinput8 -ldxguid -ldxerr8 -lsetupapi'
        SDL_INCLUDES=/opt/SDL2-2.32.10/include/SDL2/
    steps:
      - checkout
      - run: .circleci/prepare.sh
      - run: curl -L "https://github.com/mmatyas/pegasus-frontend/releases/download/alpha1/SDL2-2.32.10_mingw.tar.xz" | tar xJf - -C /opt/
      - run: .circleci/build.sh
      - run: i686-w64-mingw32-objdump -p installdir/home/build/project/src/app/C:/pegasus-frontend/pegasus-fe.exe | grep 'DLL Name' | sort
      # Deploy
      - run: zip -j dist/pegasus-fe_$(git describe --always)_win-mingw-static.zip
          installdir/home/build/project/src/app/C:/pegasus-frontend/pegasus-fe.exe
          README.md
          LICENSE.md
      - run: .circleci/stage.sh

  release:
    docker:
      - image: mmatyas/pegasus-qt_x11-2004
    steps:
      - checkout
      - run: .circleci/release_github.sh
      - run: .circleci/release_bintray.sh

workflows:
  version: 2
  all:
    jobs:
      - mingw
      - release:
          requires:
            - mingw
